<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Her</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#080610;--warm:#f5ede0;--amber:#e8a96a;--ph:'Playfair Display',serif;--fb:'Jost',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);}
#loader{position:fixed;inset:0;z-index:8000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#loader.gone{opacity:0;visibility:hidden;}
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);}
#intro.gone{opacity:0;visibility:hidden;}
.i-title{font-family:var(--ph);font-style:italic;font-size:clamp(4rem,11vw,8rem);color:var(--warm);text-align:center;margin-bottom:2rem;}
.pbtn{padding:14px 44px;border:1px solid rgba(232,169,106,.3);background:transparent;color:rgba(232,169,106,.7);font-family:var(--fb);cursor:pointer;font-size:10px;letter-spacing:.3em;text-transform:uppercase;}
.pbtn:hover{border-color:var(--amber);color:var(--amber);}
#stage{position:fixed;inset:0;z-index:1;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 2.2s ease;}
.slide.active{opacity:1;}
.sbg{position:absolute;inset:-12%;background-size:cover;background-position:center;}
.kb-zi{animation:kbZI 24s ease-out forwards;}@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.16)}}
.ll{display:block;font-family:var(--ph);font-style:italic;font-size:clamp(1.6rem,3.6vw,3.2rem);color:var(--warm);text-shadow:0 2px 80px rgba(0,0,0,1);opacity:0;transform:translateY(24px);transition:opacity 1.5s ease,transform 1.5s ease;}
.ll.in{opacity:1;transform:translateY(0);}
.ll.gold{color:var(--amber);}
.d1{transition-delay:.35s}.d2{transition-delay:.9s}.d3{transition-delay:1.5s}
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);opacity:0;pointer-events:none;transition:opacity 3s ease;}
#ec.on{opacity:1;pointer-events:all;}
.ec-name{font-family:var(--ph);font-style:italic;font-size:clamp(3rem,9vw,7rem);color:var(--warm);margin-bottom:1rem;}
.ec-msg{font-size:clamp(1rem,2vw,1.4rem);color:rgba(245,237,224,.5);line-height:1.8;max-width:480px;margin:0 auto;}
.rbtn{margin-top:2rem;padding:12px 40px;background:transparent;border:1px solid rgba(232,169,106,.18);color:rgba(232,169,106,.4);font-family:var(--fb);font-size:9px;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;}
.rbtn:hover{border-color:var(--amber);color:var(--amber);}
</style>
</head>
<body>

<div id="loader"><span style="font-size:10px;letter-spacing:.5em;color:rgba(232,169,106,.5);">Loading gift...</span></div>

<div id="intro">
  <h1 class="i-title" id="intro-title">For <span id="intro-name">Her</span></h1>
  <button class="pbtn" id="playBtn">Begin</button>
</div>

<div id="stage"></div>

<div id="ec">
  <div class="ec-inner">
    <p class="ec-name" id="ec-name">Happy Birthday.</p>
    <p class="ec-msg" id="ec-msg">Every song, every frame —<br>made only for you.</p>
    <button class="rbtn" id="replayBtn">Watch Again</button>
  </div>
</div>

<script>
let state = { slides: [], songs: [], endCard: {}, page: {} };
let cur = -1, running = false, activeSng = -1;
let audioElements = [], stTimer = null;

async function loadGift() {
  try {
    const res = await fetch('content.json');
    if (res.ok) {
      state = await res.json();
      console.log('✓ Gift loaded');
      buildSlides();
      setupAudio();
      renderEndCard();
      applyPageData();
      document.getElementById('loader').classList.add('gone');
    } else {
      console.log('No gift file found. Admin needs to create one.');
      document.getElementById('loader').innerHTML = '<span style="color:#e8a96a;">No gift found. Please create one in admin.html</span>';
    }
  } catch (e) {
    console.error('Failed to load', e);
    document.getElementById('loader').innerHTML = '<span style="color:red;">Error loading gift</span>';
  }
}

function buildSlides() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  state.slides.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide';
    d.id = `sl-${i}`;
    const kbMap = {'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift-up':'kb-du','drift-down':'kb-dr'};
    const linesHTML = (s.lines || []).map(l => {
      const cls = ['ll', `d${l.delay||1}`, l.color, l.size].filter(Boolean).join(' ');
      return `<span class="${cls}">${escHtml(l.text)}</span>`;
    }).join('');
    d.innerHTML = `
      <div class="sbg ${kbMap[s.kenBurns]||'kb-zi'}" style="background-image:url('${escAttr(s.img)}')"></div>
      <div class="sovl"></div>
      <div class="stint" style="background:${escAttr(s.tint||'rgba(0,0,0,0.26)')}"></div>
      <div class="lw ${s.pos||'pos-bc'}">${linesHTML}</div>`;
    stage.appendChild(d);
  });
}

function setupAudio() {
  audioElements = [];
  state.songs.forEach((song, i) => {
    const audio = new Audio();
    const src = song.audioData || song.audioUrl;
    if (src) audio.src = src;
    audio.preload = 'auto';
    audio.volume = 0;
    audio.addEventListener('ended', () => {
      audio.currentTime = song.start || 0;
      if (running) audio.play().catch(() => {});
    });
    audioElements[i] = audio;
  });
}

function renderEndCard() {
  const ec = state.endCard || {};
  document.getElementById('ec-name').textContent = ec.title || 'Happy Birthday.';
  document.getElementById('ec-msg').textContent = (ec.msg || 'Every song, every frame —\nmade only for you.').replace(/\\n/g, '\n');
}

function applyPageData() {
  const pg = state.page || {};
  document.getElementById('intro-name').textContent = pg.name || 'Her';
  document.getElementById('intro-title').textContent = `For ${pg.name || 'Her'}`;
}

function goSlide(idx) {
  if (idx >= state.slides.length) return showEnd();
  const prev = cur; cur = idx;
  if (prev >= 0) {
    const pe = document.getElementById(`sl-${prev}`);
    if (pe) {
      pe.querySelectorAll('.ll').forEach(l => { l.classList.remove('in'); l.classList.add('out'); });
      setTimeout(() => pe.classList.remove('active'), 2200);
    }
  }
  const el = document.getElementById(`sl-${idx}`);
  if (!el) return;
  const ob = el.querySelector('.sbg');
  if (ob) {
    const nb = document.createElement('div');
    nb.className = ob.className;
    nb.style.cssText = ob.style.cssText;
    ob.parentNode.replaceChild(nb, ob);
  }
  el.classList.add('active');
  const lls = el.querySelectorAll('.ll');
  requestAnimationFrame(() => requestAnimationFrame(() => lls.forEach(l => l.classList.add('in'))));
  const dur = state.slides[idx].dur || 9000;
  document.getElementById('pb').style.transition = `width ${dur/1000}s linear`;
  document.getElementById('pb').style.width = '100%';
  const sng = state.slides[idx].song || 0;
  if (sng !== activeSng) {
    if (activeSng >= 0 && audioElements[activeSng]) stopAudio(activeSng);
    if (audioElements[sng]) { playAudio(sng); activeSng = sng; }
  }
  clearTimeout(stTimer);
  stTimer = setTimeout(() => running && goSlide(cur+1), dur);
}

function playAudio(idx) {
  if (!audioElements[idx]?.src) return;
  const audio = audioElements[idx];
  const song = state.songs[idx];
  audio.currentTime = song.start || 0;
  audio.play().catch(() => {});
  fadeAudio(audio, 0, song.volume||0.85, 800);
}

function stopAudio(idx) {
  if (!audioElements[idx]) return;
  fadeAudio(audioElements[idx], null, 0, 1200, () => audioElements[idx].pause());
}

function fadeAudio(audio, fromVol, toVol, duration, callback) {
  let vol = fromVol != null ? fromVol : audio.volume;
  const steps = 30; const stepTime = duration / steps; const delta = (toVol - vol) / steps;
  let step = 0; const iv = setInterval(() => { vol += delta; audio.volume = Math.max(0, Math.min(1, vol)); step++; if (step >= steps) { clearInterval(iv); audio.volume = toVol; if (callback) callback(); } }, stepTime);
}

function showEnd() {
  running = false;
  document.getElementById('pb').style.width = '100%';
  audioElements.forEach((audio, i) => { if (audio && audio.src) stopAudio(i); });
  setTimeout(() => document.getElementById('ec').classList.add('on'), 2000);
}

function start() {
  document.getElementById('intro').classList.add('gone');
  document.getElementById('pw').classList.add('on');
  document.getElementById('ctr').classList.add('on');
  document.getElementById('mbars').classList.add('on');
  running = true;
  if (audioElements[0] && audioElements[0].src) { playAudio(0); activeSng = 0; }
  setTimeout(() => goSlide(0), 1800);
}

function replay() {
  document.getElementById('ec').classList.remove('on');
  cur = -1; activeSng = -1;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l => l.classList.remove('in', 'out'));
  });
  running = true;
  if (audioElements[0] && audioElements[0].src) { playAudio(0); activeSng = 0; }
  setTimeout(() => goSlide(0), 900);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) { return String(str).replace(/"/g,'&quot;'); }

document.getElementById('playBtn').addEventListener('click', start);
document.getElementById('replayBtn').addEventListener('click', replay);

loadGift();
</script>
</body>
</html>
